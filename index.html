<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Doodle Jump</title>
    <style>
        canvas {
            border: 1px solid black;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Player properties
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 20,
            height: 20,
            velocityY: 0,
            jumpForce: -15
        };

        // Game state
        let platforms = [];
        let scrollY = 0;
        let isTouching = false;
        let touchX = 0;
        let xOffset = 0;

        // Platform properties
        const platformWidth = 70;
        const platformHeight = 20;

        // Generate initial platforms
        function generatePlatforms() {
            platforms = [];
            for (let i = 0; i < 10; i++) {
                platforms.push({
                    x: Math.random() * (canvas.width - platformWidth),
                    y: i * (canvas.height / 5)
                });
            }
        }

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            isTouching = true;
            touchX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isTouching) {
                const newTouchX = e.touches[0].clientX;
                xOffset += (newTouchX - touchX) * 2;
                touchX = newTouchX;
            }
        });

        canvas.addEventListener('touchend', () => {
            isTouching = false;
        });

        // Game loop
        function update() {
            // Apply gravity
            player.velocityY += 0.5;
            player.y += player.velocityY;

            // Horizontal movement
            player.x = canvas.width/2 + xOffset;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // Platform collision
            platforms.forEach(platform => {
                if (player.velocityY > 0 &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platformWidth &&
                    player.y + player.height < platform.y + platformHeight &&
                    player.y + player.height + player.velocityY >= platform.y) {
                    player.velocityY = player.jumpForce;
                }
            });

            // Scroll screen
            if (player.y < scrollY + 100) {
                scrollY = player.y - 100;
                platforms.forEach(platform => {
                    platform.y += 5;
                    // Regenerate platforms that go off screen
                    if (platform.y > canvas.height) {
                        platform.y = -platformHeight;
                        platform.x = Math.random() * (canvas.width - platformWidth);
                    }
                });
            }

            // Game over
            if (player.y > canvas.height) {
                player.y = canvas.height - 100;
                scrollY = 0;
                xOffset = 0;
                generatePlatforms();
            }

            // Draw
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw player
            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x, player.y - scrollY, player.width, player.height);

            // Draw platforms
            ctx.fillStyle = 'green';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y - scrollY, platformWidth, platformHeight);
            });

            requestAnimationFrame(update);
        }

        // Start game
        generatePlatforms();
        update();
    </script>
</body>
</html>
