<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Farm Idle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            user-select: none;
            touch-action: manipulation;
            margin: 0;
            padding: 10px;
            background: #f0f0f0;
        }
        #gameContainer {
            max-width: 600px;
            margin: 0 auto;
        }
        #clickArea {
            background: #4CAF50;
            padding: 40px;
            margin: 20px 0;
            border-radius: 15px;
            color: white;
            font-size: 24px;
            touch-action: manipulation;
        }
        .button {
            background: #2196F3;
            color: white;
            padding: 15px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .stats {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="stats">
            Points: <span id="points">0</span><br>
            Workers: <span id="workers">0</span><br>
            Click Power: <span id="clickPower">1</span>
        </div>
        
        <div id="clickArea">TAP TO EARN</div>
        
        <div class="button" id="hireWorker">
            Hire Worker (Cost: <span id="workerCost">100</span>)
        </div>
        
        <div class="button" id="upgradeClick">
            Upgrade Click (Cost: <span id="upgradeCost">50</span>)
        </div>
    </div>

    <script>
        let points = 0;
        let workers = 0;
        let clickPower = 1;
        let workerCost = 100;
        let upgradeCost = 50;
        
        function formatNumber(num) {
            if (num >= 1e6) return (num/1e6).toFixed(1) + "M";
            if (num >= 1e3) return (num/1e3).toFixed(1) + "K";
            return num.toFixed(0);
        }

        function updateDisplay() {
            document.getElementById('points').textContent = formatNumber(points);
            document.getElementById('workers').textContent = workers;
            document.getElementById('clickPower').textContent = clickPower;
            document.getElementById('workerCost').textContent = formatNumber(workerCost);
            document.getElementById('upgradeCost').textContent = formatNumber(upgradeCost);
        }

        function addPoints(amount) {
            points += amount;
            updateDisplay();
        }

        // Clicker functionality
        document.getElementById('clickArea').addEventListener('touchstart', function(e) {
            e.preventDefault();
            this.style.backgroundColor = '#45a049';
            addPoints(clickPower);
        });

        document.getElementById('clickArea').addEventListener('touchend', function(e) {
            e.preventDefault();
            this.style.backgroundColor = '#4CAF50';
        });

        // Hire worker
        document.getElementById('hireWorker').addEventListener('touchend', function(e) {
            e.preventDefault();
            if (points >= workerCost) {
                points -= workerCost;
                workers++;
                workerCost *= 1.5;
                updateDisplay();
            }
        });

        // Upgrade click
        document.getElementById('upgradeClick').addEventListener('touchend', function(e) {
            e.preventDefault();
            if (points >= upgradeCost) {
                points -= upgradeCost;
                clickPower *= 2;
                upgradeCost *= 3;
                updateDisplay();
            }
        });

        // Auto workers
        setInterval(() => {
            addPoints(workers * clickPower);
        }, 1000);

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
