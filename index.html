<!DOCTYPE html>
<html>
<head>
    <title>Touch Flipper Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            background: #222;
        }

        #gameArea {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .flipper {
            position: absolute;
            bottom: 20px;
            width: 120px;
            height: 40px;
            background: #f00;
            border-radius: 5px;
            transition: transform 0.1s;
        }

        #leftFlipper {
            left: 20px;
            transform-origin: right center;
        }

        #rightFlipper {
            right: 20px;
            transform-origin: left center;
        }

        .active {
            transform: rotate(-30deg);
        }

        #rightFlipper.active {
            transform: rotate(30deg);
        }

        #ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.05s;
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="leftFlipper" class="flipper"></div>
        <div id="rightFlipper" class="flipper"></div>
        <div id="ball"></div>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const leftFlipper = document.getElementById('leftFlipper');
        const rightFlipper = document.getElementById('rightFlipper');
        
        let ballX = 50;
        let ballY = 50;
        let ballSpeedX = 0;
        let ballSpeedY = 0;
        let gravity = 0.5;
        let isLeftActive = false;
        let isRightActive = false;

        // Initialize ball position
        resetBall();

        function resetBall() {
            ballX = window.innerWidth / 2;
            ballY = 100;
            ballSpeedX = (Math.random() - 0.5) * 10;
            ballSpeedY = -10;
        }

        function updateBall() {
            // Apply gravity
            ballSpeedY += gravity;
            
            // Update position
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Wall collisions
            if (ballX < 10 || ballX > window.innerWidth - 10) {
                ballSpeedX *= -0.8;
                ballX = Math.max(10, Math.min(ballX, window.innerWidth - 10));
            }

            // Floor collision
            if (ballY > window.innerHeight - 10) {
                resetBall();
            }

            // Flipper collisions
            const flipperForce = 15;
            const flipperHeight = 40;
            const flipperY = window.innerHeight - 60;

            if (isLeftActive && ballY > flipperY && ballY < flipperY + flipperHeight &&
                ballX > 20 && ballX < 140) {
                ballSpeedY = -flipperForce;
                ballSpeedX = Math.abs(ballSpeedX) + 2;
            }

            if (isRightActive && ballY > flipperY && ballY < flipperY + flipperHeight &&
                ballX > window.innerWidth - 140 && ballX < window.innerWidth - 20) {
                ballSpeedY = -flipperForce;
                ballSpeedX = -(Math.abs(ballSpeedX) + 2);
            }

            // Update ball position
            ball.style.left = `${ballX - 10}px`;
            ball.style.top = `${ballY - 10}px`;
        }

        // Touch handling
        const gameArea = document.getElementById('gameArea');
        
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.touches;
            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                if (touch.clientX < window.innerWidth / 2) {
                    leftFlipper.classList.add('active');
                    isLeftActive = true;
                } else {
                    rightFlipper.classList.add('active');
                    isRightActive = true;
                }
            }
        });

        gameArea.addEventListener('touchend', (e) => {
            leftFlipper.classList.remove('active');
            rightFlipper.classList.remove('active');
            isLeftActive = false;
            isRightActive = false;
        });

        // Game loop
        function gameLoop() {
            updateBall();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();

        // Handle window resize
        window.addEventListener('resize', () => {
            resetBall();
        });
    </script>
</body>
</html>
